name: update-ipfilter

on:
  schedule:
    # daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-pr:
    runs-on: ubuntu-latest
    concurrency:
      group: update-ipfilter
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ipfilter generation
        run: |
          python ipfilter.py --output-dir . --yes

      - name: Create pull request with generated files
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ci): update ipfilter.dat and log.txt (automated)"
          branch: automated/update-ipfilter
          title: "chore(ci): update ipfilter.dat and log.txt (automated)"
          body: |
            This automated PR updates ipfilter.dat and log.txt with the latest data fetched from the configured lists.
            Generated by GitHub Actions on schedule or manual dispatch.
          labels: automated, ci
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
